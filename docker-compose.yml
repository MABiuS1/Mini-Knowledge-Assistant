services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:?APP_ENV is required}
      PORT: ${PORT:?PORT is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      UPLOAD_DIR: ${UPLOAD_DIR:?UPLOAD_DIR is required}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:?MAX_UPLOAD_BYTES is required}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:?REQUEST_TIMEOUT_SECONDS is required}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:?SESSION_TTL_HOURS is required}
      AI_PROVIDER: ${AI_PROVIDER:?AI_PROVIDER is required}
      AI_BASE_URL: ${AI_BASE_URL:?AI_BASE_URL is required}
      AI_API_KEY: ${AI_API_KEY:?AI_API_KEY is required}
      AI_MODEL: ${AI_MODEL:?AI_MODEL is required}
    ports:
      - "${PORT:?PORT is required}:${PORT:?PORT is required}"
    volumes:
      - ./data/uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    ports:
      - "${FRONTEND_PORT:?FRONTEND_PORT is required}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
